<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
        height: 380px;
        width:400px;
        background-color: white;
        margin-left:500px;
        margin-top:80px;
        padding: 20px;
        box-sizing:border-box;
        box-shadow: 0 9px 28px 0px skyblue;
        border-radius: 25px
    }
    .form-title{
        text-align:center;
        font-family: calibri;
        color:skyblue;
    }
    .text-box{
        width: 340px;
        margin-top: 20px;
        padding: 10px;
        font-size:18px;
        border-radius: 25px;
    }
    
    .login-btn{
        width: 80px;
        margin: 50px;
        padding: 10px;
        background-color: skyblue;
        color: white;
        border:0px;
        border-radius: 25px;
    }
    .login-btn:hover{
        background-color:#c0c0c0;
        cursor: pointer;
    }
    </style>
</head>
<body>
        <div class="box">
        <h1 class="form-title">Login Please</h1>
        <form>
            <input type="text" class="text-box" placeholder="Enter Username" />
            <input type="password" class="text-box" placeholder="Enter Password" />
            <input type="submit" class="login-btn" value="Login" />
        </form>
    </div>
</body>
</html>
