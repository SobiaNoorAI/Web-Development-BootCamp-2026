<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            min-height:800px ;
            border: 2px solid black;
            display: flex;
            gap: 20px;

        }
        .box{
            height: 200px;
            width: 200px;
            background-color: skyblue;
            flex-grow: 0;
        }
        #box1{
            flex-grow: 2;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="box1" class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>
</html>
