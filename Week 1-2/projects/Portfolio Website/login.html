<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height:380px;
            width: 400px;
            background-color: #ffffff;
            margin-left:500px;
            margin-top:100px;
            box-sizing: border-box;
            box-shadow: 0px 9px 28px 0px rgba(0,0,0,0.75);
            padding:20px;

        }
        .form-title{
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            
        }
        .text-box{
            width: 340px;
            margin-top:20px;
            padding: 10px;

        }
        .login-btn{                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 
            width: 360px;
            margin-top:50px ;
            padding:10px;
            background-color: black;
            color:white;
            border:none;

        }
        .login-btn:hover{
            background-color: red;
            cursor: pointer;
        }
    </style>
</head>
<body style="background-color: #c0c0c0;">
    <div class="box">
        <h2 class="form-title">Login Please</h2>
        <form>
            <input type="text" class="text-box" placeholder="Enter Username" />
            <input type="password" class="text-box" placeholder="Enter Password" />
            <input type="submit" class="login-btn" value="Login" />
        </form>
    </div>
</body>
</html>
